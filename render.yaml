services:
  - type: web
    name: aureon-commerce-api
    runtime: node
    rootDir: .
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run prisma:push --workspace backend && npm run prisma:generate --workspace backend && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
